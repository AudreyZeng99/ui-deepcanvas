name: Deploy to GitHub Pages

on:
  push:
    branches:
      - master
      - 'exp-*'

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Set base path
        run: |
          if [ "${GITHUB_REF_NAME}" = "master" ]; then
            echo "BASE_PATH=/ui-deepcanvas/" >> $GITHUB_ENV
          else
            echo "BASE_PATH=/ui-deepcanvas/previews/${GITHUB_REF_NAME}/" >> $GITHUB_ENV
          fi

      - name: Build
        run: npm run build

      - name: Deploy (master)
        if: github.ref == 'refs/heads/master'
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist
          clean: true
          clean-exclude: previews

      - name: Deploy (preview)
        if: startsWith(github.ref, 'refs/heads/exp-')
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist
          target-folder: previews/${{ github.ref_name }}
          clean: true
